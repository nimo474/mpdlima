<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /Sharedmpd5files</title>
    <style>
        body { font-family: monospace; background: #ffffff; color: #000000; padding: 20px; margin: 0; }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 24px; }
        .logout-btn { background: #db4437; color: white; border: none; padding: 5px 10px; cursor: pointer; font-family: monospace; font-weight: bold; }
        .logout-btn:hover { background: #b52b1e; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 5px 10px; }
        th { border-bottom: 2px solid #000; font-weight: bold; }
        tr:hover { background-color: #f5f5f5; }
        a { color: #0000ee; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .text-right { text-align: right; }
        .loading { font-style: italic; color: #555; margin-top: 15px; }
        footer { margin-top: 30px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1 id="dirTitle">Index of /Sharedmpd5files</h1>
        <div>
            User: <b id="userTerlogin"></b> | 
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="statusLoading" class="loading">Memuat daftar direktori...</div>

    <table id="dirTable" style="display: none;">
        <thead>
            <tr>
                <th>Nama File / Folder</th>
                <th class="text-right" style="width: 150px;">Terakhir Diubah</th>
                <th class="text-right" style="width: 100px;">Ukuran</th>
            </tr>
        </thead>
        <tbody id="fileList">
            <!-- Data akan diisi oleh JavaScript -->
        </tbody>
    </table>

    <footer>
        <p>Sistem Cloud Webserver Terkoneksi Google Drive Api v3 via Apps Script.</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzw2eTcXAYBKwZbJIvkclJ92K5gZukBdW1ntuH6e3v3NTy-ZKYXFmyJ2Aaib50RBy8/exec"; 

        // PROTEKSI KEAMANAN SISI KLIEN
        if (!sessionStorage.getItem("user")) {
            window.location.href = "index.html";
        } else {
            document.getElementById("userTerlogin").innerText = sessionStorage.getItem("user");
            muatIsiDirektori();
        }

        async function muatIsiDirektori() {
            try {
                // 1. Ambil parameter ID folder dari URL browser jika ada (?folder=xxxx)
                const urlParams = new URLSearchParams(window.location.search);
                const targetFolderId = urlParams.get('folder') || ""; 

                // 2. Panggil API dengan menyertakan ID folder tujuan
                const response = await fetch(`${API_URL}?folderId=${targetFolderId}`);
                const hasil = await response.json();
                
                if (hasil.status === "success") {
                    // Update judul direktori sesuai nama folder aktif
                    document.getElementById("dirTitle").innerText = `Index of /${hasil.namaFolder}`;

                    const fileListElement = document.getElementById("fileList");
                    fileListElement.innerHTML = ""; 
                    
                    // Tombol Kembali ke Induk jika sedang berada di dalam subfolder
                    if (hasil.isSubfolder) {
                        fileListElement.innerHTML += `
                            <tr>
                                <td colspan="3">📁 <a href="dashboard.html${hasil.parentFolderId ? '?folder=' + hasil.parentFolderId : ''}">.. (Kembali ke Folder Atas)</a></td>
                            </tr>
                        `;
                    }

                    if (hasil.data.length === 0 && !hasil.isSubfolder) {
                        fileListElement.innerHTML = `<tr><td colspan="3" style="font-style:italic; color:#777;">(Folder kosong)</td></tr>`;
                    } else {
						hasil.data.forEach(item => {
							// KEBAL PERBEDAAN DATA: Cek apakah tipe adalah 'Folder' atau nama diakhiri tanda garis miring (/)
							const isFolder = item.tipe === "Folder" || item.nama.endsWith("/");
							const ikon = isFolder ? "📁" : "📄";
    
							// Pastikan jika folder, link akan mengarah ke dashboard.html dengan query ID folder baru, bukan item.url
							const linkTujuan = isFolder ? `dashboard.html?folder=${item.id}` : item.url;
							const targetAttr = isFolder ? "" : 'target="_blank"';

							const baris = `
								<tr>
									<td>${ikon} <a href="${linkTujuan}" ${targetAttr}>${item.nama}</a></td>
									<td class="text-right">${item.diubah}</td>
									<td class="text-right">${item.ukuran}</td>
								</tr>
							`;
							fileListElement.innerHTML += baris;
						});

                    }
                    
                    document.getElementById("statusLoading").style.display = "none";
                    document.getElementById("dirTable").style.display = "table";
                } else {
                    document.getElementById("statusLoading").innerText = "Gagal: " + hasil.message;
                }
            } catch (error) {
                document.getElementById("statusLoading").innerText = "Terjadi kesalahan fatal koneksi API Drive.";
                console.error(error);
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
