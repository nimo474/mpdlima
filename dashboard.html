<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Utama</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* Gaya Desain Tombol Akses Folder */
        .btn-drive { display: inline-block; width: 100%; padding: 14px; margin-top: 20px; background: #1f9a55; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; text-decoration: none; box-sizing: border-box; transition: background 0.2s; }
        .btn-drive:hover { background: #167e43; }
        
        .btn-logout { width: 100%; padding: 12px; background: #db4437; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-logout:hover { background: #c53929; }
        p { color: #555; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Selamat Datang! 🎉</h2>
        <p>Halo, <b id="userTerlogin"></b>. Anda berhasil masuk ke sistem.</p>
        
        <!-- TOMBOL MENU MENUJU GOOGLE DRIVE -->
        <a href="https://drive.google.com/drive/folders/1Am9znV4W1_w7VCQt74lKS1YU_rJhiv57?usp=sharing" target="_blank" class="btn-drive">
            📁 Buka Folder Sharedmpd5files
        </a>

        <button onclick="logout()" class="btn-logout">Keluar</button>
    </div>

    <script>
        // PROTEKSI KEAMANAN: Jika mencoba buka URL ini tanpa login, usir kembali ke halaman depan
        if (!sessionStorage.getItem("user")) {
            window.location.href = "index.html";
        } else {
            document.getElementById("userTerlogin").innerText = sessionStorage.getItem("user");
        }

        function logout() {
            sessionStorage.clear(); // Hapus jejak login
            window.location.href = "index.html"; // Tendang ke form login
        }
    </script>
</body>
</html>
