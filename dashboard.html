<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Utama</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        button { width: 100%; padding: 12px; background: #db4437; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #c53929; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Selamat Datang! 🎉</h2>
        <p>Halo, <b id="userTerlogin"></b>. Anda berhasil masuk menggunakan halaman terpisah.</p>
        <button onclick="logout()">Keluar</button>
    </div>

    <script>
        // PROTEKSI KEAMANAN: Jika mencoba buka URL ini tanpa login, usir kembali ke halaman depan
        if (!sessionStorage.getItem("user")) {
            window.location.href = "index.html";
        } else {
            document.getElementById("userTerlogin").innerText = sessionStorage.getItem("user");
        }

        function logout() {
            sessionStorage.clear(); // Hapus jejak login
            window.location.href = "index.html"; // Tendang ke form login
        }
    </script>
</body>
</html>
